<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brainmoto Lesson Mindmap - Compact Interactive</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Nunito:wght@500;700;800&display=swap");

    :root {
      --purple-700: #51278d;
      --purple-600: #6734af;
      --purple-500: #7f4ac9;
      --lavender-100: #efe3ff;
      --lavender-200: #dfc8ff;
      --mustard-400: #ffd45a;
      --mustard-500: #f1bc1c;
      --ink-900: #271a3f;
      --ink-700: #4e3b6e;
      --ink-500: #786495;
      --line: rgba(81, 39, 141, 0.24);
      --surface: rgba(255, 255, 255, 0.94);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Nunito", "Segoe UI", Tahoma, sans-serif;
      color: var(--ink-900);
      background:
        radial-gradient(900px 450px at 10% 8%, rgba(186, 142, 255, 0.22), transparent 55%),
        radial-gradient(700px 450px at 92% 85%, rgba(241, 188, 28, 0.18), transparent 60%),
        linear-gradient(160deg, #f8f3ff 0%, #fbf7ff 55%, #fff9e6 100%);
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: linear-gradient(120deg, rgba(103, 52, 175, 0.12), rgba(255, 212, 90, 0.16));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(1rem, 1.6vw, 1.3rem);
      color: var(--purple-700);
      font-family: "Nunito", "Manrope", sans-serif;
      letter-spacing: 0.2px;
    }

    .title p {
      margin: 3px 0 0;
      font-size: 0.82rem;
      color: var(--ink-700);
    }

    .tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .btn {
      border: 1px solid rgba(81, 39, 141, 0.35);
      background: #fff;
      color: var(--purple-700);
      border-radius: 9px;
      padding: 6px 9px;
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover {
      background: rgba(127, 74, 201, 0.1);
    }

    .layout {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      min-height: 0;
    }

    .map-card {
      position: relative;
      overflow: hidden;
      min-height: 560px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.95), rgba(250,245,255,0.95)),
        repeating-linear-gradient(0deg, rgba(127,74,201,0.05), rgba(127,74,201,0.05) 1px, transparent 1px, transparent 20px),
        repeating-linear-gradient(90deg, rgba(127,74,201,0.05), rgba(127,74,201,0.05) 1px, transparent 1px, transparent 20px);
    }

    #mindmap {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .hint {
      position: absolute;
      top: 8px;
      left: 10px;
      font-size: 0.74rem;
      color: var(--ink-700);
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 5px 7px;
      pointer-events: none;
      max-width: 70%;
    }

    .density {
      position: absolute;
      bottom: 8px;
      left: 10px;
      font-size: 0.72rem;
      color: var(--ink-500);
      background: rgba(255,255,255,0.88);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      pointer-events: none;
    }

    .detail-card {
      display: flex;
      flex-direction: column;
      padding: 10px;
      overflow: auto;
      gap: 8px;
    }

    .node-title {
      margin: 0;
      font-size: 1rem;
      color: var(--purple-700);
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      background: rgba(127,74,201,0.14);
      border: 1px solid rgba(103,52,175,0.28);
      color: var(--purple-700);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 0.7rem;
      font-weight: 700;
    }

    .node-text {
      margin: 0;
      font-size: 0.84rem;
      line-height: 1.4;
      color: var(--ink-700);
    }

    .group h3 {
      margin: 0 0 6px;
      font-size: 0.76rem;
      letter-spacing: 0.45px;
      text-transform: uppercase;
      color: var(--ink-500);
    }

    .group ul {
      margin: 0;
      padding-left: 18px;
      display: grid;
      gap: 4px;
      font-size: 0.82rem;
      color: var(--ink-700);
    }

    .script {
      border: 1px dashed rgba(176,124,0,0.44);
      background: rgba(241,188,28,0.15);
      color: #6a4a00;
      border-radius: 9px;
      padding: 8px;
      font-size: 0.81rem;
      line-height: 1.35;
    }

    .edge {
      fill: none;
      stroke: rgba(81,39,141,0.35);
      stroke-width: 1.7;
      stroke-linecap: round;
    }

    .node {
      cursor: pointer;
    }

    .node-rect {
      stroke: rgba(81,39,141,0.35);
      stroke-width: 1.15;
      rx: 10;
      ry: 10;
    }

    .node.selected .node-rect {
      stroke: rgba(176,124,0,0.95);
      stroke-width: 2.1;
      filter: drop-shadow(0 0 6px rgba(241,188,28,0.35));
    }

    .node-label {
      font-size: 11px;
      fill: #2f2150;
      font-weight: 700;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .toggle {
      fill: #fff;
      stroke: rgba(81,39,141,0.45);
      stroke-width: 1.1;
      cursor: pointer;
    }

    .toggle-symbol {
      font-size: 11px;
      fill: var(--purple-700);
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      font-weight: 800;
    }

    @media (max-width: 1160px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .map-card {
        min-height: 62vh;
      }

      .detail-card {
        max-height: 36vh;
      }

      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }

      .tools {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <div class="layout">
      <section class="card map-card">
        <div class="hint">Click node for details. Click +/- to collapse or expand. Drag to pan, wheel to zoom.</div>
        <div class="density" id="nodeCount">Nodes: 0</div>
        <svg id="mindmap" viewBox="0 0 1200 700" aria-label="Compact lesson mindmap"></svg>
      </section>

      <aside class="card detail-card" id="detailCard"></aside>
    </div>
  </div>

                title: "Quiet Guidance: Whisper and Nudge",
                short: "Correct without stealing attention from Lead Teacher.",

                tags: ["Class Control", "Communication"],
                weight: 4,
                why: [

                  "Use shoulder tap or hand signal for refocus."

                script: "Soft whisper, quick cue, back to lesson flow."

      const firstLevelSide = {
        prep: -1,
        intro: -1,
        delivery: 1,
        ending: 1,
        performance: -1,
        support_teacher: 1
      };


      const sectionColors = {
        Core: "#f2e7ff",
        Preparation: "#e9d9ff",
        Introduction: "#e2ceff",
        Delivery: "#d3bbff",
        Ending: "#f4d98e",
        Performance: "#d4c0ff",
        "Support Teacher": "#cab1ff"
      };

      const state = {
        selectedId: "root",
        collapsed: new Set(),
        pan: { x: 0, y: 0, scale: 1 }
      };

      const index = {
        allNodes: [],
        byId: new Map(),
        parentById: new Map(),
        depthById: new Map()
      };

      const visible = {
        positions: new Map(),
        sizes: new Map(),
        edges: []
      };

      const ns = "http://www.w3.org/2000/svg";
      const svg = document.getElementById("mindmap");
      const detailCard = document.getElementById("detailCard");
      const nodeCount = document.getElementById("nodeCount");

      const zoomInBtn = document.getElementById("zoomInBtn");
      const zoomOutBtn = document.getElementById("zoomOutBtn");
      const centerBtn = document.getElementById("centerBtn");
      const collapseBtn = document.getElementById("collapseBtn");
      const expandBtn = document.getElementById("expandBtn");

      function createSvg(tag, attrs = {}) {
        const el = document.createElementNS(ns, tag);
        Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
        return el;
      }

      function escapeHtml(str) {
        return String(str || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function buildIndex(node, parentId = null, depth = 0) {
        index.allNodes.push(node);
        index.byId.set(node.id, node);
        index.parentById.set(node.id, parentId);
        index.depthById.set(node.id, depth);

        if (depth >= 2 && Array.isArray(node.children) && node.children.length > 0) {
          state.collapsed.add(node.id);
        }

        (node.children || []).forEach((child) => buildIndex(child, node.id, depth + 1));
      }

      function hasChildren(node) {
        return Array.isArray(node.children) && node.children.length > 0;
      }

      function isExpanded(node) {
        return hasChildren(node) && !state.collapsed.has(node.id);
      }

      function visibleChildren(node) {
        if (!hasChildren(node)) return [];
        return isExpanded(node) ? node.children : [];
      }

      function leafCount(node) {
        const kids = visibleChildren(node);
        if (kids.length === 0) return 1;
        return kids.reduce((sum, kid) => sum + leafCount(kid), 0);
      }

      function wrapText(text, maxChars) {
        const words = (text || "").split(/\s+/).filter(Boolean);
        const lines = [];
        let line = "";

        words.forEach((word) => {
          const candidate = line ? `${line} ${word}` : word;
          if (candidate.length > maxChars && line) {
            lines.push(line);
            line = word;
          } else {
            line = candidate;
          }
        });

        if (line) lines.push(line);
        return lines.slice(0, 2);
      }

      function nodeSize(node) {
        const depth = index.depthById.get(node.id) || 0;
        const maxChars = depth === 0 ? 24 : depth === 1 ? 19 : 17;
        const lines = wrapText(node.title, maxChars);
        const w = depth === 0 ? 190 : depth === 1 ? 162 : 148;
        const h = 28 + (lines.length - 1) * 13;
        return { w, h, lines };
      }

      function computeLayout() {
        visible.positions = new Map();
        visible.sizes = new Map();
        visible.edges = [];

        const rect = svg.getBoundingClientRect();
        const width = Math.max(760, Math.floor(rect.width || 760));
        const height = Math.max(520, Math.floor(rect.height || 520));

        const xGap = width < 1100 ? 200 : 225;
        const yGap = width < 1100 ? 52 : 56;

        visible.positions.set("root", { x: 0, y: 0, depth: 0, side: 0 });

        const rootChildren = tree.children || [];
        const left = [];
        const right = [];

        rootChildren.forEach((child) => {
          const side = firstLevelSide[child.id] || 1;
          if (side < 0) left.push(child);
          else right.push(child);
        });

        function placeSubtree(node, depth, side, yTop) {
          const kids = visibleChildren(node);
          if (kids.length === 0) {
            visible.positions.set(node.id, { x: side * depth * xGap, y: yTop, depth, side });
            return 1;
          }

          const totalLeaves = kids.reduce((sum, kid) => sum + leafCount(kid), 0);
          let cursor = yTop;
          kids.forEach((kid) => {
            const leaves = leafCount(kid);
            placeSubtree(kid, depth + 1, side, cursor);
            cursor += leaves * yGap;
          });

          visible.positions.set(node.id, {
            x: side * depth * xGap,
            y: yTop + ((totalLeaves - 1) * yGap) / 2,
            depth,
            side
          });
          return totalLeaves;
        }

        function placeSide(branches, side) {
          if (branches.length === 0) return;
          const totalLeaves = branches.reduce((sum, b) => sum + leafCount(b), 0);
          let cursor = -((totalLeaves - 1) * yGap) / 2;

          branches.forEach((branch) => {
            const leaves = leafCount(branch);
            placeSubtree(branch, 1, side, cursor);
            cursor += leaves * yGap;
          });
        }

        placeSide(left, -1);
        placeSide(right, 1);

        function collectEdges(node) {
          const kids = visibleChildren(node);
          if (kids.length === 0) return;
          kids.forEach((kid) => {
            visible.edges.push({ from: node.id, to: kid.id });
            collectEdges(kid);
          });
        }

        collectEdges(tree);

        index.allNodes.forEach((node) => {
          if (!visible.positions.has(node.id)) return;
          visible.sizes.set(node.id, nodeSize(node));
        });

        return { width, height };
      }

      function edgePath(a, b) {
        const fromSize = visible.sizes.get(a.id) || { w: 140 };
        const toSize = visible.sizes.get(b.id) || { w: 140 };
        const dir = b.x >= a.x ? 1 : -1;

        const sx = a.x + dir * (fromSize.w / 2);
        const sy = a.y;
        const ex = b.x - dir * (toSize.w / 2);
        const ey = b.y;

        const dx = ex - sx;
        const c1x = sx + dx * 0.35;
        const c2x = sx + dx * 0.7;

        return `M ${sx} ${sy} C ${c1x} ${sy}, ${c2x} ${ey}, ${ex} ${ey}`;
      }

      function renderDetails() {
        const node = index.byId.get(state.selectedId) || tree;

        const tags = (node.tags || [])
          .slice(0, 6)
          .map((tag) => `<span class="pill">${escapeHtml(tag)}</span>`)
          .join("");

        const why = (node.why || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("");
        const how = (node.how || []).map((item) => `<li>${escapeHtml(item)}</li>`).join("");

        detailCard.innerHTML = `
          <h2 class="node-title">${escapeHtml(node.title)}</h2>
          <div class="meta">
            <span class="pill">${escapeHtml(node.section || "Core")}</span>
            <span class="pill">${escapeHtml(node.role || "Both")}</span>
            ${tags}
          </div>
          <p class="node-text">${escapeHtml(node.short || "")}</p>
          ${why ? `<div class="group"><h3>Why It Matters</h3><ul>${why}</ul></div>` : ""}
          ${how ? `<div class="group"><h3>How To Do It</h3><ul>${how}</ul></div>` : ""}
          ${node.script ? `<div class="script"><strong>Micro Script:</strong> ${escapeHtml(node.script)}</div>` : ""}
        `;
      }

      function drawMap() {
        const { width, height } = computeLayout();
        svg.setAttribute("viewBox", `0 0 ${width} ${height}`);
        svg.innerHTML = "";

        const bg = createSvg("rect", {
          x: "0",
          y: "0",
          width: String(width),
          height: String(height),
          fill: "transparent",
          class: "map-bg"
        });
        svg.appendChild(bg);

        const viewport = createSvg("g", { id: "viewport" });
        svg.appendChild(viewport);

        const edgeLayer = createSvg("g");
        const nodeLayer = createSvg("g");
        viewport.appendChild(edgeLayer);
        viewport.appendChild(nodeLayer);

        visible.edges.forEach((edge) => {
          const from = visible.positions.get(edge.from);
          const to = visible.positions.get(edge.to);
          if (!from || !to) return;
          const path = createSvg("path", {
            d: edgePath(from, to),
            class: "edge"
          });
          edgeLayer.appendChild(path);
        });

        index.allNodes.forEach((node) => {
          if (!visible.positions.has(node.id)) return;
          const pos = visible.positions.get(node.id);
          const size = visible.sizes.get(node.id);
          const kids = hasChildren(node) ? node.children : [];
          const expanded = isExpanded(node);

          const g = createSvg("g", {
            transform: `translate(${pos.x}, ${pos.y})`,
            class: `node ${node.id === state.selectedId ? "selected" : ""}`,
            "data-id": node.id
          });

          const rect = createSvg("rect", {
            x: String(-size.w / 2),
            y: String(-size.h / 2),
            width: String(size.w),
            height: String(size.h),
            fill: sectionColors[node.section] || "#ead9ff",
            class: "node-rect"
          });
          g.appendChild(rect);

          const text = createSvg("text", { class: "node-label" });
          const startY = -((size.lines.length - 1) * 7);
          size.lines.forEach((line, i) => {
            const tspan = createSvg("tspan", {
              x: "0",
              y: String(startY + i * 14)
            });
            tspan.textContent = line;
            text.appendChild(tspan);
          });
          g.appendChild(text);

          if (kids.length > 0) {
            const side = pos.side >= 0 ? 1 : -1;
            const tx = side * (size.w / 2 + 10);
            const toggle = createSvg("circle", {
              cx: String(tx),
              cy: "0",
              r: "8",
              class: "toggle"
            });
            toggle.addEventListener("click", (ev) => {
              ev.stopPropagation();
              if (state.collapsed.has(node.id)) state.collapsed.delete(node.id);
              else state.collapsed.add(node.id);
              renderAll();
            });
            g.appendChild(toggle);

            const symbol = createSvg("text", {
              x: String(tx),
              y: "0",
              class: "toggle-symbol"
            });
            symbol.textContent = expanded ? "-" : "+";
            g.appendChild(symbol);
          }

          g.addEventListener("click", () => {
            state.selectedId = node.id;
            renderDetails();
            drawMap();
          });

          nodeLayer.appendChild(g);
        });

        applyTransform();
        nodeCount.textContent = `Visible nodes: ${visible.positions.size}`;
      }

      function applyTransform() {
        const rect = svg.getBoundingClientRect();
        const cx = (rect.width || 800) / 2;
        const cy = (rect.height || 560) / 2;

        const viewport = svg.querySelector("#viewport");
        if (!viewport) return;

        viewport.setAttribute(
          "transform",
          `translate(${cx + state.pan.x}, ${cy + state.pan.y}) scale(${state.pan.scale})`
        );
      }

      function renderAll() {
        drawMap();
        renderDetails();
      }

      function bindEvents() {
        zoomInBtn.addEventListener("click", () => {
          state.pan.scale = Math.min(2.8, state.pan.scale * 1.1);
          applyTransform();
        });

        zoomOutBtn.addEventListener("click", () => {
          state.pan.scale = Math.max(0.45, state.pan.scale / 1.1);
          applyTransform();
        });

        centerBtn.addEventListener("click", () => {
          state.pan = { x: 0, y: 0, scale: 1 };
          applyTransform();
        });

        collapseBtn.addEventListener("click", () => {
          state.collapsed = new Set(
            index.allNodes
              .filter((node) => hasChildren(node) && node.id !== "root")
              .map((node) => node.id)
          );
          renderAll();
        });

        expandBtn.addEventListener("click", () => {
          state.collapsed.clear();
          renderAll();
        });

        let dragging = false;
        let sx = 0;
        let sy = 0;

        svg.addEventListener("pointerdown", (ev) => {
          const target = ev.target;
          if (target && typeof target.closest === "function" && target.closest(".node")) {
            return;
          }
          dragging = true;
          sx = ev.clientX;
          sy = ev.clientY;
          svg.setPointerCapture(ev.pointerId);
        });

        svg.addEventListener("pointermove", (ev) => {
          if (!dragging) return;
          const dx = ev.clientX - sx;
          const dy = ev.clientY - sy;
          sx = ev.clientX;
          sy = ev.clientY;
          state.pan.x += dx;
          state.pan.y += dy;
          applyTransform();
        });

        svg.addEventListener("pointerup", (ev) => {
          dragging = false;
          if (svg.hasPointerCapture(ev.pointerId)) {
            svg.releasePointerCapture(ev.pointerId);
          }
        });

        svg.addEventListener(
          "wheel",
          (ev) => {
            ev.preventDefault();
            const factor = ev.deltaY < 0 ? 1.08 : 0.92;
            state.pan.scale = Math.max(0.45, Math.min(2.8, state.pan.scale * factor));
            applyTransform();
          },
          { passive: false }
        );

        window.addEventListener("resize", drawMap);
      }

      buildIndex(tree);
      bindEvents();
      renderAll();
    })();
  </script>
